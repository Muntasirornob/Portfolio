<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact Muntasir" />
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container site-header-inner">
        <a class="site-brand" href="index.html#home" aria-label="Go to home">
          Muntasir<span class="brand-dot">.</span>
        </a>

        <nav class="site-nav" aria-label="Primary">
          <a href="about.html">About</a>
          <a href="index.html#projects">Projects</a>
          <a href="index.html#skills">Skills</a>
          <a href="contact.html" aria-current="page">Contact</a>
        </nav>

        <a class="button button--primary site-header-cta" href="contact.html">Hire me</a>
      </div>
    </header>

    <main class="contact-page">
      <section class="contact-section section">
        <div class="container contact-layout">
          <aside class="contact-intro">
            <h1>
              Let's build something amazing together!
            </h1>
            <p class="contact-lead">Any Questions? Connect through social media.</p>

            <div class="about-contact-block">
              <h6>Email :</h6>
              <a class="about-email" href="mailto:muntasirornob@gmail.com">muntasirornob@gmail.com</a>
            </div>

            <div class="about-contact-block">
              <h6>Say Hello :</h6>
              <div class="social-row" aria-label="Social links">
                <a href="https://www.linkedin.com/in/muntasir-chowdhury-787b8b143/" aria-label="LinkedIn" target="_blank" rel="noreferrer">in</a>
                <a href="https://github.com/Muntasirornob" aria-label="GitHub" target="_blank" rel="noreferrer">⌂</a>
              </div>
            </div>
          </aside>

          <article class="contact-form-wrap">
            <h2>Contact form :</h2>
            <form class="contact-form">
              <label>
                <span>Name</span>
                <input type="text" name="name" placeholder="Your name" />
              </label>

              <label>
                <span>Email address</span>
                <input type="email" name="email" placeholder="you@example.com" />
              </label>

              <label>
                <span>Message</span>
                <textarea name="message" rows="5" placeholder="Write your message..."></textarea>
              </label>

              <button class="button button--primary contact-submit" type="submit">Submit ➢</button>
            </form>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
